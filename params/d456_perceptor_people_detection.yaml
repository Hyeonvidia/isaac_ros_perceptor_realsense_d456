# D456 Perceptor config — people detection mode (PeopleNet 640x480 resized)
# Used by: ./run_deploy.sh mode:=people_detection

nvblox_config:
  container_name: 'nvblox_container'
  attach_to_container: true
  node_name: 'nvblox_node'
  remappings:
    - depth:
        image: '/camera0/realsense_splitter_node/output/depth'
        info: '/camera0/depth/camera_info'
      color:
        image: '/camera0/detection/image_resized'
        info: '/camera0/detection/camera_info_resized'
  config_files:
    - package: 'isaac_ros_perceptor_realsense_d456'
      path: 'params/default_nvblox_config.yaml'
    - package: 'nvblox_examples_bringup'
      path: 'config/nvblox/specializations/nvblox_detection.yaml'
    - package: 'isaac_ros_perceptor_realsense_d456'
      path: 'config/nvblox/nvblox_d456.yaml'
  parameters:
    - integrate_depth_rate_hz: 15.0
    - use_lidar: false
    - use_segmentation: true
    - input_qos: "SENSOR_DATA"

cuvslam_config:
  container_name: 'nvblox_container'
  attach_to_container: true
  node_name: 'visual_slam_node'
  remappings:
    stereo_images:
      - left:
          image: '/camera0/realsense_splitter_node/output/infra_1'
          info: '/camera0/infra1/camera_info'
          optical_frame: 'camera0_infra1_optical_frame'
        right:
          image: '/camera0/realsense_splitter_node/output/infra_2'
          info: '/camera0/infra2/camera_info'
          optical_frame: 'camera0_infra2_optical_frame'
  config_files:
    - package: 'isaac_ros_perceptor_realsense_d456'
      path: 'params/default_cuvslam_config.yaml'
  parameters:
    - image_jitter_threshold_ms: 100.0
    - enable_image_denoising: false
    - enable_imu_fusion: false
    - enable_ground_constraint_in_odometry: false

common_config:
  map_frame: 'map'
  odom_frame: 'odom'
  robot_frame: 'camera0_link'
