# NvBlox parameter overrides for RealSense D456.
# Applied on top of nvblox_base.yaml + nvblox_realsense.yaml.
# Only keys that differ from the upstream realsense specialization are set here.
/**:
  ros__parameters:
    # Lidar settings
    use_lidar: false
    # QoS settings
    input_qos: "SENSOR_DATA"
    # Map clearing settings
    map_clearing_frame_id: "camera0_link"
    # D456 depth at 30Hz with emitter_on_off → splitter outputs 15Hz
    integrate_depth_rate_hz: 15.0
    # Rviz visualization
    esdf_slice_bounds_visualization_attachment_frame_id: "camera0_link"

    static_mapper:
      esdf_slice_height: 0.0
      # D456 is typically mounted higher than D435i; expand the ESDF slice range
      esdf_slice_min_height: -0.2
      esdf_slice_max_height: 0.5

    dynamic_mapper:
      esdf_slice_height: 0.0
      esdf_slice_min_height: -0.2
      esdf_slice_max_height: 0.5
